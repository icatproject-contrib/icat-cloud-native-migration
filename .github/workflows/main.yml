name: CI

on:
  push:
    branches:
      - main

jobs:
  Integration_Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push simple authenticator
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./authentication
          args:
            AUTH_TYPE: simple
            AUTH_VERSION: 2.0.1
          tags: ${{ secrets.HARBOR_URL }}/icat_auth_simple:latest

      - name: Build and push anon authenticator
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./authentication
          args:
            AUTH_TYPE: anon
            AUTH_VERSION: 2.0.1
          tags: ${{ secrets.HARBOR_URL }}/icat_auth_anon:latest

      - name: Build and push icat
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./icat
          tags: ${{ secrets.HARBOR_URL }}/icat_6:latest

      - name: Build and push testdata
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./testdata
          tags: ${{ secrets.HARBOR_URL }}/icat_testdata:latest
